repos:
  - repo: local
    hooks:
      - id: cargo-fmt-codemap
        name: cargo fmt (codemap-search)
        entry: cargo fmt --manifest-path apps/codemap-search/Cargo.toml --check
        language: system
        pass_filenames: false
        files: ^apps/codemap-search/.*\.rs$
      - id: cargo-clippy-codemap
        name: cargo clippy (codemap-search)
        entry: cargo clippy --manifest-path apps/codemap-search/Cargo.toml --all-targets -- -D warnings
        language: system
        pass_filenames: false
        files: ^apps/codemap-search/.*\.rs$
