name: codemap-search CI

on:
  push:
    branches: [main]
    paths:
      - "apps/codemap-search/**"
      - ".github/workflows/codemap-search-ci.yml"
  pull_request:
    paths:
      - "apps/codemap-search/**"
      - ".github/workflows/codemap-search-ci.yml"

# Cancel superseded runs on the same ref.
concurrency:
  group: codemap-search-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

# fmt + clippy are NOT run here — they are enforced by the local prek hook
# (.pre-commit-config.yaml). CI gates on `test` and a release `build`, which
# run as two independent jobs (no `needs:` edge) so they execute in parallel.
jobs:
  test:
    name: test
    # Skip on the release commit. release-it pushes `chore(release): codemap-vX.Y.Z`
    # to main (which matches this workflow's push/paths trigger), but the tagged
    # codemap-search-release.yml already builds every target, so re-running CI here
    # is redundant. The guard fires only for that exact commit-message prefix on
    # push events; pull requests and every other main push still run normally. The
    # job shows as "skipped" (no runner, no minutes) rather than a real run.
    if: "${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release): codemap-v') }}"
    runs-on: ubuntu-latest
    # Run from the standalone crate so commands match local invocations.
    defaults:
      run:
        working-directory: apps/codemap-search
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/codemap-search
      - name: test
        run: cargo test

  build:
    name: release build (${{ matrix.os }})
    # Same release-commit skip as `test` above.
    if: "${{ github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release): codemap-v') }}"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/codemap-search
    strategy:
      fail-fast: false
      # All supported OSes get a release build: Linux, macOS, and Windows
      # (each builds its native host target in release mode). Cross-arch
      # variants (musl, arm64-linux, arm64-windows) are validated by the
      # tag-triggered codemap-search-release.yml, not on every PR.
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/codemap-search
      - name: build --release
        run: cargo build --release
